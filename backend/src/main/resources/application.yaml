spring:
  application:
    name: mesa-api

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/mesa}
    username: ${DB_USERNAME:mesa}
    password: ${DB_PASSWORD:mesa}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

server:
  port: 8080
  servlet:
    context-path: /api

app:
  security:
    jwt:
      secret: ${JWT_SECRET:mesa-local-jwt-secret-change-me-minimum-32-characters}
      issuer: mesa-api
      access-token-ttl: 1h

  restaurant-search:
    base-url: "${NOMINATIM_BASE_URL:https://nominatim.openstreetmap.org}"
    user-agent: "${NOMINATIM_USER_AGENT:Mesa/0.1}"
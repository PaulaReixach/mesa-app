services:
  postgres:
    image: postgres:16-alpine
    container_name: mesa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mesa
      POSTGRES_USER: mesa
      POSTGRES_PASSWORD: mesa
    ports:
      - "5432:5432"
    volumes:
      - mesa-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mesa -d mesa"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mesa-postgres-data: